<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
}

video {
    width: 100%;
    height: 100%;
    object-fit: contain;
}
</style>

</head>

<body>

<video id="menuVideo" autoplay muted loop playsinline preload="auto">
    <source src="poutine-vertical1-lg.mp4" type="video/mp4">
</video>

<script>
const video = document.getElementById("menuVideo");
const params = new URLSearchParams(window.location.search);

function startVideo() {
    const promise = video.play();

    if (promise !== undefined) {
        promise.catch(() => {
            setTimeout(() => {
                video.play().catch(() => {});
            }, 1000);
        });
    }
}

if (params.get("compat") === "1") {

    video.autoplay = false;
    video.load();

    window.onload = function () {
        startVideo();
    };

    document.addEventListener("visibilitychange", function () {
        if (!document.hidden) {
            startVideo();
        }
    });

} else {

    window.onload = function () {
        startVideo();
    };

}
</script>

</body>
</html>
